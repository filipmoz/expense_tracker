version: '3.8'

services:
  web:
    build: .
    container_name: expense-tracker-app
    ports:
      - "8999:8999"
    volumes:
      # Mount database to persist data
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/expenses.db
      - PORT=8999
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8999/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
